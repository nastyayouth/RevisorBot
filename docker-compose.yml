services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: revisor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d revisor"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=revisor;Username=postgres;Password=postgres
      Telegram__BotToken: "1359286619:AAFIXFu2D9D4JWSm5Tah2tf1VtGuuZxa-Io"
      OpenAI__ApiKey: "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"
      OpenAI__Model: "gpt-4o-mini"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
