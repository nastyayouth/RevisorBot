version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: revisor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: revisor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - revisor_pgdata:/var/lib/postgresql/data

volumes:
  revisor_pgdata:
