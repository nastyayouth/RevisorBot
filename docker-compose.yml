services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: revisor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d revisor"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=revisor;Username=postgres;Password=<password>
      Telegram__BotToken: "<Add your Telegram bot token here>"
      OpenAI__ApiKey: "<Add your OpenAI API key here>"
      OpenAI__Model: "gpt-4o-mini"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
